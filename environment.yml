name: rejuvenation-atlas
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - numpy=1.26.*
  - pandas=2.2.*
  - scipy=1.13.*
  - scikit-learn=1.5.*
  - statsmodels=0.14.*
  - anndata=0.9.*         # 0.10 removed anndata.io, which squidpy 1.6 still imports
  - scanpy=1.10.*
  - squidpy=1.6.*
  - scvi-tools=1.1.*
  - pot=0.9.*          # Python Optimal Transport (module 2)
  - matplotlib=3.9.*
  - seaborn=0.13.*
  - plotly=5.22.*
  - streamlit=1.36.*
  - pyarrow=16.*
  - openpyxl=3.*        # pandas.read_excel for the SASP Atlas S1 Table workbook
  - requests=2.32.*
  - pyyaml=6.*
  - pytest=8.*
  - awscli
  - nextflow=23.10.*
  - pip
  - pip:
      - gseapy==1.1.*
